# Nirogidhara AI Command Center — production Nginx config.
#
# Container-internal Nginx that:
#  - serves the Vite-built React SPA from /usr/share/nginx/html
#  - proxies /api/   → backend:8000  (Daphne ASGI / DRF JSON)
#  - proxies /admin/ → backend:8000  (Django admin)
#  - proxies /ws/    → backend:8000  (Channels WebSocket — Audit feed)
#
# Compose maps this container's :80 to host :18020 to avoid colliding with
# Postzyo / OpenClaw on the same VPS. A host-level Nginx (or Traefik) then
# terminates TLS for ai.nirogidhara.com and reverse-proxies to 127.0.0.1:18020.
#
# Hard rules:
#  - SPA fallback must NOT swallow /api, /admin, /ws, /static, /media.
#  - WebSocket headers must be forwarded so /ws/audit/events/ keeps the
#    Phase 4A live feed working (Dashboard + Governance + WhatsApp Inbox).
#  - Never trust the request scheme — always set X-Forwarded-Proto from
#    the upstream proxy when one is configured (Hostinger Traefik, etc.).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream nirogidhara_backend {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Hostinger / Traefik / Cloudflare may upload images; 25 MB covers
    # WhatsApp media forwarding without opening a DoS vector.
    client_max_body_size 25m;

    # Compression for the SPA bundle and JSON responses.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/atom+xml
        application/rss+xml
        application/manifest+json
        application/wasm
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # ---- Backend API (DRF / JWT auth) ------------------------------------
    location /api/ {
        proxy_pass http://nirogidhara_backend;
        proxy_http_version 1.1;
        proxy_set_header Host                 $host;
        proxy_set_header X-Real-IP            $remote_addr;
        proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto    $scheme;
        proxy_set_header X-Forwarded-Host     $host;
        proxy_set_header X-Forwarded-Port     $server_port;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- Django admin ----------------------------------------------------
    location /admin/ {
        proxy_pass http://nirogidhara_backend;
        proxy_http_version 1.1;
        proxy_set_header Host                 $host;
        proxy_set_header X-Real-IP            $remote_addr;
        proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto    $scheme;
        proxy_set_header X-Forwarded-Host     $host;
        proxy_redirect off;
    }

    # ---- Phase 4A live AuditEvent WebSocket ------------------------------
    # `Connection: upgrade` and `Upgrade: $http_upgrade` are mandatory for
    # the Channels group fan-out to survive the proxy hop.
    location /ws/ {
        proxy_pass http://nirogidhara_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }

    # ---- Django static files (collectstatic output via shared volume) ----
    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---- React SPA -------------------------------------------------------
    # Hashed assets get a long cache; index.html stays no-cache so deploys
    # show up immediately.
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
